# Local full stack for laptop testing: db → migrate (one-shot) → api → bot.
# DATABASE_URL/BACKEND_BASE_URL are overridden here to point at compose
# service hostnames; everything else (BOT_TOKEN, INTERNAL_TOKEN,
# ALLOWED_TG_IDS) comes from `.env` at runtime — see .dockerignore.
# Prod (AWS → Supabase) uses docker-compose.prod.yml instead.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow
      POSTGRES_DB: cashflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # localhost-only, for GUI clients (TablePlus/DBeaver/PyCharm);
      # 5433 to avoid clashing with any Postgres on the host's 5432
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow -d cashflow"]
      interval: 2s
      timeout: 3s
      retries: 15

  # One-shot: real Alembic migrations against the compose db (D40 — the
  # psql SCHEMA.sql shortcut is a macOS-host workaround, not needed in
  # Linux containers).
  migrate:
    build: .
    image: cashflow:local
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cashflow:cashflow@db:5432/cashflow
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    image: cashflow:local
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql://cashflow:cashflow@db:5432/cashflow
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  bot:
    build: .
    image: cashflow:local
    command: python -m bot.bot
    env_file: .env
    environment:
      # Unused by the bot (zero DB imports) but required by config.Settings;
      # pinned here so the local stack never depends on the host DATABASE_URL.
      DATABASE_URL: postgresql://cashflow:cashflow@db:5432/cashflow
      BACKEND_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
